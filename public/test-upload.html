<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Test</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      form { display: flex; flex-direction: column; gap: 0.75rem; max-width: 400px; }
      button { padding: 0.6rem 1rem; width: fit-content; }
      img { margin-top: 1rem; max-width: 300px; border: 1px solid #ccc; }
      pre { background: #f5f5f5; padding: 1rem; overflow: auto; }
    </style>
  </head>
  <body>
    <h2>Upload Test</h2>
    <form id="uploadForm">
      <input type="file" id="image" name="image" accept="image/*" required />
      <input type="text" id="fileName" name="fileName" placeholder="File name" />
      <input type="text" id="contentType" name="contentType" placeholder="Content type" />
      <button type="submit">Upload</button>
    </form>

    <h3>Preview</h3>
    <button id="previewBtn" type="button">Get Preview URL</button>
    <pre id="responseBox">No response yet.</pre>
    <img id="previewImage" alt="Preview" />

    <script>
      const apiBase = 'http://localhost:2000';
      const presignUploadUrl = `${apiBase}/api/v1/uploads/presign-upload`;
      const presignViewUrl = `${apiBase}/api/v1/uploads/presign-view`;
      const uploadForm = document.getElementById('uploadForm');
      const previewBtn = document.getElementById('previewBtn');
      const responseBox = document.getElementById('responseBox');
      const previewImage = document.getElementById('previewImage');
      let uploadedKey = '';

      const setPreview = (previewUrl) => {
        if (previewUrl) {
          previewImage.src = previewUrl;
          previewImage.style.display = 'block';
        } else {
          previewImage.removeAttribute('src');
          previewImage.style.display = 'none';
        }
      };

      uploadForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const file = document.getElementById('image').files[0];
        const fileName = document.getElementById('fileName').value || file?.name || 'upload';
        const contentType = document.getElementById('contentType').value || file?.type || 'application/octet-stream';

        if (!file) {
          alert('Please choose an image.');
          return;
        }

        try {
          const presignResponse = await fetch(presignUploadUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fileName,
              contentType,
              contentLength: file.size,
            }),
          });

          const presignData = await presignResponse.json();
          responseBox.textContent = JSON.stringify(presignData, null, 2);

          if (!presignResponse.ok) {
            uploadedKey = '';
            setPreview('');
            return;
          }

          uploadedKey = presignData.key ?? '';

          const uploadResponse = await fetch(presignData.presignedUrl, {
            method: 'PUT',
            headers: { 'Content-Type': contentType },
            body: file,
          });

          if (!uploadResponse.ok) {
            throw new Error(`S3 upload failed with status ${uploadResponse.status}`);
          }

          const viewResponse = await fetch(presignViewUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: uploadedKey }),
          });

          const viewData = await viewResponse.json();
          responseBox.textContent = JSON.stringify({ presign: presignData, view: viewData }, null, 2);

          if (!viewResponse.ok) {
            setPreview('');
            return;
          }

          setPreview(viewData.presignedUrl ?? '');
        } catch (error) {
          responseBox.textContent = 'Upload failed: ' + error;
          setPreview('');
        }
      });

      previewBtn.addEventListener('click', async () => {
        if (!uploadedKey) {
          alert('Upload an image first.');
          return;
        }

        try {
          const response = await fetch(presignViewUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: uploadedKey }),
          });

          const data = await response.json();
          responseBox.textContent = JSON.stringify(data, null, 2);

          if (!response.ok) {
            setPreview('');
            return;
          }

          setPreview(data.presignedUrl ?? '');
        } catch (error) {
          responseBox.textContent = 'Preview failed: ' + error;
          setPreview('');
        }
      });
    </script>
  </body>
</html>
