# ──────────────────────────────────────────────────────────────
# docker-compose.prod.yml — CI/CD deployment configuration
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Env vars are injected via .env file or CI/CD secrets.
# ──────────────────────────────────────────────────────────────

services:
  ekyc-api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-ekyc-api}:${DOCKER_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-2000}:2000"
    environment:
      - NODE_ENV=production
      - PORT=2000
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - MONGO_URI=${MONGO_URI}
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
